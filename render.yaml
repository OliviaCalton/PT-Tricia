services:
  - type: web
    name: pt-tricia
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: ANTHROPIC_API_KEY
        sync: false   # you'll paste this in the Render dashboard
    disk:
      name: pt-tricia-data
      mountPath: /opt/render/project/src
      sizeGB: 1
